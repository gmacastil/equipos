apiVersion: apps/v1
kind: Deployment
metadata:
  name: equipos
  labels:
    app: equipos
  namespace: diplomado
spec:
  replicas: 2
  selector:
    matchLabels:
      app: equipos
  template:
    metadata:
      labels:
        app: equipos
    spec:
      containers:
        - name: equipos
          image: mauron/equipos:5
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: equipos-config
            - secretRef:
                name: equipos-secret
---


