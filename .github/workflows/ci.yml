name: Docker Image CI

on:
  push:
    branches: [ "main", "develop", "qa" ]
  pull_request:
    branches: [ "main", "develop", "qa" ]
    

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Compilar java
      run: mvn clean package -DskipTests

    - name: Run sonar scanner
      uses: sonarsource/sonarcloud-github-action@master
      with:
        args: >
          -Dsonar.projectKey=equipos
          -Dsonar.organization=litethinking
          -Dsonar.host.url=https://sonarqube.business-litethinking.com
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
          -Dsonar.java.binaries=target/classes
          -Dsonar.sources=src/main/java
          -Dsonar.tests=src/test/java

    - name: Build the Docker image
      run: | 
          docker build . -t equipos:${{ github.run_number }}
          docker tag equipos:${{ github.run_number }} mauron/equipos:${{ github.run_number }}
 
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: mauron
        password: ${{ secrets.DOCKER_PASSWORD }}
      
    - name: Push the Docker image
      run: docker push mauron/equipos:${{ github.run_number }}
      

    

